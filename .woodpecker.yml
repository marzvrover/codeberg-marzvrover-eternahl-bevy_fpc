labels:
  platform: linux/amd64

steps:
  check:
    image: rust:1-alpine
    environment: &env
      - CARGO_TERM_COLOR=always
      - RUSTFLAGS=--cfg=web_sys_unstable_apis -C target-feature=-crt-static
    commands:
      # system dependencies needed by bevy
      - apk add gcc libc-dev pkgconf libx11-dev alsa-lib-dev eudev-dev mesa-vulkan-intel
      # compilation + tests
      - cargo test
